name: Issue Handler
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Print issue
        run: echo "${{ github.event.issue.body }}"
      - name: Print comment
        run: echo "${{ github.event.comment.body }}"
      - name: Call AI
        uses: anthropics/claude-code-action@v1
        with:
          prompt: "Summarise this: ${{ github.event.issue.body }}"
      - name: Run AI output
        run: echo "${{ steps.call-ai.outputs.response }}"